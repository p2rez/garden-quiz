<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Express Server</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }

    .container {
      background: white;
      padding: 48px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #111;
    }

    p {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    a {
      display: inline-block;
      padding: 10px 24px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    a:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Express Server</h1>
    <p>Your Node.js Express server is running. Static files are served from the <code>public/</code> folder.</p>
    <a href="/api/healthz">Check API Health</a>
  </div>
</body>
</html>
