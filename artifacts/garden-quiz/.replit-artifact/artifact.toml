kind = "web"
previewPath = "/"
title = "Garden Quiz"
version = "1.0.0"
id = "artifacts/garden-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20572

[services.development]
run = "pnpm --filter @workspace/garden-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/garden-quiz", "run", "build" ]
publicDir = "artifacts/garden-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20572"
BASE_PATH = "/"
